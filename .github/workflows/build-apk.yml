name: Build APK
on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.3.0

      - name: Setup Java 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      - name: Get project ZIP
        run: |
          echo "Download ZIP dari Telegram..."
          # Nanti kita isi link download ZIP dari bot
          # Sementara pake file dummy dulu buat test
          mkdir project
          cd project

      - name: Install dependencies
        working-directory: ./project
        run: flutter pub get

      - name: Build APK Release
        working-directory: ./project
        run: flutter build apk --release --split-per-abi

      - name: Upload APK to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk -name "app-arm64-v8a-release.apk" | head -n 1)
          curl -F chat_id=$CHAT_ID -F document=@$APK_PATH \
          https://api.telegram.org/bot$BOT_TOKEN/sendDocument \
          -F caption="✅ Build Selesai! APK siap install"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/
